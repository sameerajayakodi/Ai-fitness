name: ai_fitness
description: "An AI-powered fitness app with Gemini API integration, meal plans, and daily motivation."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0

  # Gemini API
  google_generative_ai: ^0.3.0

  # Image and file handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # UI and state management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  get: ^4.6.0

  # Date and time
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # HTTP and networking
  http: ^1.1.0
  dio: ^5.3.0

  # Local storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # UI components
  flutter_svg: ^2.0.0
  lottie: ^2.6.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # Utilities
  uuid: ^4.0.0
  logger: ^2.0.0
  connectivity_plus: ^5.0.0
  equatable: ^2.0.5

  # Image processing
  path_provider: ^2.1.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # Fonts disabled until font files are added
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
